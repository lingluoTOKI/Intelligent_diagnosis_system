# ===========================================
# 眼部疾病诊断数据集配置
# ===========================================

# 数据集根目录（相对于此yaml文件的路径）
path: .

# 数据集划分
train: eyes_train/images
val: eyes_val
test: eyes_test/images

# 类别数量
nc: 8

# 类别名称（按字母顺序排列）
names:
  0: A
  1: C
  2: D
  3: G
  4: H
  5: M
  6: N
  7: O

# ===========================================
# 类别说明
# ===========================================
# A: 正常眼
# C: 白内障
# D: 糖尿病视网膜病变
# G: 青光眼
# H: 高血压性视网膜病变
# M: 黄斑病变
# N: 视神经病变
# O: 其他眼部疾病